name: desktop-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to, e.g. v0.8.61-desktop-beta.1"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-desktop:
    name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate macOS signing secrets
        if: matrix.platform == 'darwin'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK || secrets.MACOS_CERT_P12_BASE64 || secrets.MACOS_CERTIFICATE_P12 || secrets.APPLE_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || secrets.MACOS_CERT_PASSWORD || secrets.MACOS_CERTIFICATE_PASSWORD || secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID || secrets.APPLE_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER || secrets.APPLE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY || secrets.APPLE_API_PRIVATE_KEY || secrets.APPLE_NOTARIZE_API_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${CSC_LINK:-}" ]] && missing+=("CSC_LINK")
          [[ -z "${CSC_KEY_PASSWORD:-}" ]] && missing+=("CSC_KEY_PASSWORD")
          [[ -z "${APPLE_API_KEY_ID:-}" ]] && missing+=("APPLE_API_KEY_ID")
          [[ -z "${APPLE_API_ISSUER:-}" ]] && missing+=("APPLE_API_ISSUER")
          [[ -z "${APPLE_API_KEY:-}" ]] && missing+=("APPLE_API_KEY")
          if ((${#missing[@]} > 0)); then
            echo "::error::Missing required macOS signing/notarization secrets: ${missing[*]}"
            exit 1
          fi

      - name: Build Desktop (macOS)
        if: matrix.platform == 'darwin'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK || secrets.MACOS_CERT_P12_BASE64 || secrets.MACOS_CERTIFICATE_P12 || secrets.APPLE_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || secrets.MACOS_CERT_PASSWORD || secrets.MACOS_CERTIFICATE_PASSWORD || secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID || secrets.APPLE_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER || secrets.APPLE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY || secrets.APPLE_API_PRIVATE_KEY || secrets.APPLE_NOTARIZE_API_KEY }}
        run: |
          set -euo pipefail
          pnpm -C packages/nextclaw-core build
          pnpm -C packages/nextclaw-runtime build
          pnpm -C packages/extensions/nextclaw-channel-runtime build
          pnpm -C packages/nextclaw-ui build
          pnpm -C packages/nextclaw-openclaw-compat build
          pnpm -C packages/nextclaw-server build
          pnpm -C packages/nextclaw build
          pnpm -C apps/desktop build:main
          pnpm -C apps/desktop exec electron-builder --mac dmg zip --publish never

      - name: Verify macOS Signature and Notarization
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find apps/desktop/release -maxdepth 2 -type d -name 'NextClaw Desktop.app' | head -n 1)"
          if [ -z "${APP_PATH}" ]; then
            echo "macOS app bundle not found under apps/desktop/release"
            exit 1
          fi
          DMG_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "${DMG_PATH}" ]; then
            echo "macOS dmg not found in apps/desktop/release"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          spctl --assess --type execute --verbose=4 "${APP_PATH}"
          xcrun stapler validate "${DMG_PATH}"

      - name: Smoke Desktop Install (macOS DMG)
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "${DMG_PATH}" ]; then
            echo "macOS dmg not found in apps/desktop/release"
            exit 1
          fi
          apps/desktop/scripts/smoke-macos-dmg.sh "${DMG_PATH}" 240

      - name: Build Desktop (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          pnpm -C packages/nextclaw-core build
          pnpm -C packages/nextclaw-runtime build
          pnpm -C packages/extensions/nextclaw-channel-runtime build
          pnpm -C packages/nextclaw-ui build
          pnpm -C packages/nextclaw-openclaw-compat build
          pnpm -C packages/nextclaw-server build
          pnpm -C packages/nextclaw build
          pnpm -C apps/desktop build:main
          pnpm -C apps/desktop exec electron-builder --win dir --x64 --publish never

      - name: Smoke Desktop (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "apps/desktop/release/win-unpacked/NextClaw Desktop.exe")) {
            throw "Windows desktop executable not found in apps/desktop/release/win-unpacked"
          }
          $desktopExe = (Resolve-Path "apps/desktop/release/win-unpacked/NextClaw Desktop.exe").Path
          & "apps/desktop/scripts/smoke-windows-desktop.ps1" -DesktopExePath $desktopExe -StartupTimeoutSec 180

      - name: Archive desktop artifacts (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "apps/desktop/release/win-unpacked")) {
            throw "Windows desktop unpacked directory not found."
          }
          $zipPath = "apps/desktop/release/NextClaw Desktop-win32-x64-unpacked.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Compress-Archive -Path "apps/desktop/release/win-unpacked/*" -DestinationPath $zipPath

      - name: Upload Smoke Logs (macOS)
        if: matrix.platform == 'darwin' && always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-logs-darwin-arm64
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/nextclaw-desktop-smoke-home/logs/**
            ${{ runner.temp }}/nextclaw-desktop-smoke-logs/**
            ~/Library/Logs/NextClaw Desktop/**

      - name: Upload Smoke Logs (Windows)
        if: matrix.platform == 'win32' && always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-logs-win32-x64
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/nextclaw-desktop-smoke-home/logs/**
            ~\AppData\Roaming\NextClaw Desktop\logs\**

      - name: Upload desktop artifacts (macOS)
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*-mac.zip
            apps/desktop/release/latest-mac.yml
            apps/desktop/release/*.blockmap

      - name: Upload desktop artifacts (Windows)
        if: matrix.platform == 'win32'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/NextClaw Desktop-win32-x64-unpacked.zip

  publish-release-assets:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: dist/desktop-release
          merge-multiple: true

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || github.event.inputs.release_tag }}
          overwrite_files: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/desktop-release/*.dmg
            dist/desktop-release/*-mac.zip
            dist/desktop-release/*-win32-*-unpacked.zip
            dist/desktop-release/*.blockmap
